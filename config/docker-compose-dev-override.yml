services:
  api:
    build: 
      context: .
      dockerfile: config/Dockerfile
      target: dev
    volumes:
      - ./iot_api:/app/iot_api

  rp:
    restart: always
    image: traefik
    environment:
      - TZ=Europe/Paris
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/traefik.yml:/traefik.yml:ro
    ports:
      - 127.0.0.1:${APP_PORT}:80
      - 127.0.0.1:1${APP_PORT}:8080
    networks:
      - reverse_proxy

networks:
  reverse_proxy:
    name: reverse_proxy
    external: false